version: '3.8'

services:
  # 1. 메인 데이터베이스 (MySQL)
  mysql:
    image: mysql:8.0
    container_name: meal_assistant_mysql
    ports:
      - "3306:3306" # 외부(내 컴퓨터)의 3306 포트를 컨테이너 내부의 3306과 연결
    environment:
      TZ: Asia/Seoul # 한국 시간대 설정
      MYSQL_ROOT_PASSWORD: ai_meal_assistant123!
      MYSQL_DATABASE: meal_assistant # 컨테이너가 켜질 때 이 이름으로 DB를 자동 생성해 줌
    volumes:
      - mysql_data:/var/lib/mysql # 도커를 껐다 켜도 데이터가 날아가지 않도록 볼륨(저장소) 매핑
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

#  # 2. 캐시 및 임시 데이터 저장소 (Redis)
#  redis:
#    image: redis:7.0-alpine
#    container_name: meal_assistant_redis
#    ports:
#      - "6379:6379"
#    volumes:
#      - redis_data:/data
#    command: redis-server --appendonly yes # 데이터를 디스크에 주기적으로 백업하는 옵션

# 데이터를 영구적으로 저장하기 위한 볼륨 선언
volumes:
  mysql_data:
  redis_data: